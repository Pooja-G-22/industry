<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoLoop ISEP-5 | Intelligent Supplier Economic Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<!-- Firebase SDKs -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDt0Ov08xaYN69xU1sDOObaHy8bJGvqt_g",
    authDomain: "ecoloop-67fce.firebaseapp.com",
    databaseURL: "https://ecoloop-67fce-default-rtdb.firebaseio.com",
    projectId: "ecoloop-67fce",
    storageBucket: "ecoloop-67fce.firebasestorage.app",
    messagingSenderId: "50320708460",
    appId: "1:50320708460:web:3f2b6d2ea475250b83d949"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // Save Industry Verification → Firebase: industries/[GSTIN]
  window.saveIndustryVerification = async function() {
    const tin = document.getElementById('tin').value.trim();
    const gst = document.getElementById('gst').value.trim();
    const name = document.getElementById('companyName').value.trim();
    const sector = document.getElementById('sector').value;
    const state = document.getElementById('state').value;
    const contact = document.getElementById('contactPerson').value.trim();
    if (!tin || !gst || !name || !sector || !state || !contact) { showToast('⚠️ Please fill all required fields'); return; }
    try {
      showToast('⏳ Saving to Firebase…');
      await set(ref(db, 'industries/' + gst), { tin, gst, companyName: name, sector, state, contactPerson: contact, registeredAt: new Date().toISOString() });
      window._currentIndustryGST = gst;
      window._currentIndustryName = name;
      showToast('✅ Industry verified & saved!');
      setTimeout(() => goTo('page-waste-upload'), 800);
    } catch(e) { showToast('❌ ' + e.message); }
  };

  // Save Waste Listing → Firebase: wasteListing/[auto-id]
  window.saveWasteListing = async function() {
    const qty = document.getElementById('quantity').value.trim();
    const price = document.getElementById('price').value.trim();
    const desc = document.getElementById('wasteDesc').value.trim();
    if (!qty || !price || !desc) { showToast('⚠️ Please fill all required fields'); return; }
    const chips = [...document.querySelectorAll('.waste-chip.active')].map(c => c.textContent);
    try {
      showToast('⏳ Saving listing…');
      const newRef = await push(ref(db, 'wasteListing'), {
        industryGST: window._currentIndustryGST || 'DEMO',
        industryName: window._currentIndustryName || 'Demo Industry',
        wasteTypes: chips, quantity: qty,
        unit: document.getElementById('unit').value,
        pricePerUnit: price, currency: 'INR',
        disposalMethod: document.getElementById('disposal').value,
        description: desc,
        pickupAddress: document.getElementById('pickupAddr').value,
        buyerQuery: document.getElementById('buyerQuery').value,
        geoLat: window._geoLat || null, geoLon: window._geoLon || null,
        geoTimestamp: window._geoTime || null,
        listedAt: new Date().toISOString(), status: 'active'
      });
      window._currentListingId = newRef.key;
      showToast('✅ Waste listing saved!');
      setTimeout(() => goTo('page-waste-analysis'), 800);
    } catch(e) { showToast('❌ ' + e.message); }
  };

  // Save Analysis → Firebase: wasteAnalysis/[auto-id]
  window.saveAnalysis = async function() {
    try {
      showToast('⏳ Submitting analysis…');
      await push(ref(db, 'wasteAnalysis'), {
        listingId: window._currentListingId || 'DEMO',
        recyclePercent: document.getElementById('pctRecycle').textContent,
        reusePercent: document.getElementById('pctReuse').textContent,
        demolishPercent: document.getElementById('pctDemolish').textContent,
        recycleMethod: document.getElementById('recycleMethod').value,
        reuseMethod: document.getElementById('reuseMethod').value,
        pollutionRisk: document.getElementById('riskPct').textContent,
        analysedAt: new Date().toISOString()
      });
      showToast('✅ Listing submitted!');
      setTimeout(() => goTo('page-industry-dashboard'), 800);
    } catch(e) { showToast('❌ ' + e.message); }
  };

  // Save Buyer → Firebase: buyers/[email]
  window.saveBuyer = async function() {
    const name = document.getElementById('buyerName').value.trim();
    const org = document.getElementById('buyerOrg').value.trim();
    const email = document.getElementById('buyerEmail').value.trim();
    const phone = document.getElementById('buyerPhone').value.trim();
    const alt = document.getElementById('buyerAlt').value.trim();
    const gst = document.getElementById('buyerGst').value.trim();
    const addr = document.getElementById('buyerAddr').value.trim();
    if (!name || !org || !email || !phone || !alt || !gst || !addr) { showToast('⚠️ Please fill all required fields'); return; }
    try {
      showToast('⏳ Registering buyer…');
      const key = email.replace(/\./g,'_').replace(/@/g,'_at_');
      await set(ref(db, 'buyers/' + key), {
        fullName: name, organisation: org, email, phone,
        alternateContact: alt, gstOrPan: gst, address: addr,
        materialInterest: document.getElementById('buyerMaterial').value,
        annualVolume: document.getElementById('buyerVol').value,
        registeredAt: new Date().toISOString()
      });
      window._currentBuyerName = name;
      window._currentBuyerOrg = org;
      showToast('✅ Buyer registered!');
      setTimeout(() => goTo('page-buyer-dashboard'), 800);
    } catch(e) { showToast('❌ ' + e.message); }
  };

  // Save Negotiation Message → Firebase: negotiations/[auto-id]
  window.saveNegoMessage = async function(sender, message, company, material) {
    try {
      await push(ref(db, 'negotiations'), {
        sender, message, company, material,
        buyerName: window._currentBuyerName || 'Buyer',
        timestamp: new Date().toISOString()
      });
    } catch(e) { console.warn('Nego save:', e.message); }
  };

  // Load listing count from DB
  onValue(ref(db, 'wasteListing'), (snap) => {
    const data = snap.val();
    const el = document.getElementById('listingCount');
    if (el && data) el.textContent = Object.keys(data).length + ' MATCHES';
  });
</script>
